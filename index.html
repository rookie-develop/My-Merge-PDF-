<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Merge PDF — Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">Merge<span>PDF</span></div>
      <button id="themeToggle">🌙</button>
    </header>

    <main class="container">
      <h1>Merge PDF Files</h1>
      <p class="subtitle">Drag, reorder, merge — beautifully simple.</p>

      <div class="upload-box" id="dropArea">
        <input
          type="file"
          id="pdfInput"
          accept="application/pdf"
          multiple
          hidden
        />
        <div class="upload-icon">📄</div>
        <p>Drop PDFs here or</p>
        <button id="selectBtn">Select Files</button>
      </div>

      <div class="summary">
        <span id="fileCount">0 files</span>
        <span id="totalSize">0 MB</span>
      </div>

      <div id="fileGrid" class="file-grid"></div>

      <div class="actions">
        <button id="clearBtn" class="secondary-btn">Clear All</button>
        <button id="mergeBtn" class="primary-btn">Merge PDFs</button>
      </div>
    </main>

    <footer>© 2026 MergePDF — 100% Client‑Side Secure</footer>

    <!-- Libraries -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
